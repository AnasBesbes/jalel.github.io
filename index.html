    :root{

    /* ===== En-tête ===== */
    header{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 18px;
      background:linear-gradient(180deg,#0e2019,#0a1712);
      border-bottom:1px solid var(--ring);
      position:relative;
    }
    header::after{
      content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:0}
    .logo-mark{width:46px; height:46px; flex:none; filter:drop-shadow(0 4px 10px rgba(0,0,0,.45))}
    .logo-mark svg{width:100%; height:100%; display:block}
    .brand-text{display:flex; flex-direction:column; min-width:0; gap:1px}
    .brand-name{
      font-family:"Amiri", serif; font-weight:700; font-size:23px; color:var(--gold-2);
      margin:0; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand-sub{font-size:11px; color:var(--muted); letter-spacing:.6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .actions{display:flex; gap:8px; align-items:center; flex:none}

    /* ===== Boutons (mêmes classes) ===== */
    .btn{
      appearance:none; cursor:pointer; user-select:none;
      padding:11px 15px; border-radius:12px; font-weight:700; font-family:inherit;
      background:linear-gradient(180deg,#122820,#0d1e18); color:var(--ink);
      border:1px solid var(--ring); transition:transform .15s ease, border-color .2s, box-shadow .2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .btn:hover{transform:translateY(-1px); border-color:var(--gold-dim)}
    .btn:active{transform:translateY(0)}
    .btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
    .btn.primary{background:linear-gradient(180deg,var(--emerald),var(--emerald-2)); border-color:#1c4a37; color:#eafff5}
    .btn.warn{background:linear-gradient(180deg,#7a5623,#4d3714); border-color:#5a4423; color:#f6e6c8}
    .btn.danger{background:linear-gradient(180deg,var(--danger),#4d1a1a); border-color:#5a2020}
    /* CTA principal "اختر ملف PDF" mis en or */
    .btn.blue{
      background:linear-gradient(180deg,var(--gold-2),var(--brass)); color:#2a1e08;
      border-color:var(--gold-dim); font-weight:800;
      box-shadow:0 4px 16px rgba(201,162,95,.25), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .btn.blue:hover{border-color:var(--gold-2)}

    /* ===== Contrôles (même grille, mêmes champs) ===== */
    .controls{
      display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:12px;
      padding:14px 18px;
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border-bottom:1px solid var(--ring);
    }
    .field{display:grid; gap:6px}
    .label{font-size:12px; color:var(--muted); font-weight:600}
    .input, select{
      width:100%; background:#0a1712; color:var(--ink);
      border:1px solid var(--ring); border-radius:11px; padding:10px 12px; outline:none;
      font-family:inherit; transition:border-color .2s;
    }
    .input:focus{border-color:var(--gold-dim)}

    /* ===== Zone de lecture ===== */
    .viewer-container{
      position:relative; width:100%; height:calc(100vh - 220px);
      overflow:hidden; background:radial-gradient(120% 120% at 50% 0%, #0a1712, #050d0a);
    }
    .viewer{position:absolute; inset:0; display:flex; justify-content:center; align-items:center}
    canvas{
      max-width:100%; max-height:100%; object-fit:contain;
      background:#0b0f0d; box-shadow:0 14px 50px rgba(0,0,0,.55);
      border-radius:2px;
    }

    .overlay{position:absolute; inset:10px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; opacity:0; visibility:hidden; transition:opacity .35s, visibility .35s}
    .chip{pointer-events:auto; background:rgba(6,17,13,.72); color:var(--ink); padding:6px 11px; border-radius:9px; font-size:13px; border:1px solid rgba(201,162,95,.28); backdrop-filter:blur(4px)}

    .big-controls{position:absolute; inset:0; display:flex; justify-content:space-between; align-items:center; padding:16px; pointer-events:none; opacity:0; visibility:hidden; transition:opacity .35s, visibility .35s}
    .big-controls .navBtn{
      pointer-events:auto; width:60px; height:60px; border-radius:50%;
      border:1px solid rgba(201,162,95,.35); background:rgba(6,17,13,.55); color:var(--gold-2);
      font-size:26px; display:grid; place-items:center; backdrop-filter:blur(4px);
      transition:background .2s, transform .15s;
    }
    .big-controls .navBtn:hover{background:rgba(201,162,95,.18); transform:scale(1.05)}
    .big-controls .navBtn:disabled{opacity:.3}

    .viewer-container.ready .overlay,
    .viewer-container.ready .big-controls{opacity:1; visibility:visible}

    /* ===== Dédicace / écran d'accueil ===== */
    /* flex + overflow:auto + margin:auto sur l'enfant = centré quand ça rentre,
       défilable (sans rognage) quand le contenu est plus haut que la zone */
    .welcome{
      position:absolute; inset:0; display:flex; overflow-y:auto;
      padding:16px 16px 22px;
      transition:opacity .5s ease, visibility .5s ease;
      animation:fadeUp .8s ease both;
    }
    .welcome.hidden{opacity:0; visibility:hidden}
    .welcome-inner{
      margin:auto; display:flex; flex-direction:column; align-items:center;
      text-align:center; gap:12px; max-width:520px; width:100%;
    }
    @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

    .frame{
      position:relative; padding:14px;
      background:linear-gradient(180deg,#12281f,#0d1f18);
      border:1px solid var(--gold-dim); border-radius:6px;
      box-shadow:0 22px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(201,162,95,.14);
    }
    .frame::before{content:""; position:absolute; inset:6px; border:1px solid rgba(201,162,95,.4); border-radius:3px; pointer-events:none}
    .portrait{display:block; width:auto; height:auto; max-width:min(56vw,230px); max-height:38vh; border-radius:3px}
    .diamond{position:absolute; width:9px; height:9px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 10px rgba(201,162,95,.6)}
    .diamond.tl{top:-5px; left:-5px} .diamond.tr{top:-5px; right:-5px}
    .diamond.bl{bottom:-5px; left:-5px} .diamond.br{bottom:-5px; right:-5px}

    .ded-eyebrow{font-size:12px; letter-spacing:3px; color:var(--gold); font-weight:700}
    .ded-name{font-family:"Amiri", serif; font-weight:700; font-size:30px; margin:0; color:var(--gold-2); line-height:1.3}
    .ded-sub{font-family:"Amiri", serif; font-size:17px; color:var(--muted)}
    .ornament{display:flex; align-items:center; gap:12px; justify-content:center; margin:2px 0}
    .ornament span{height:1px; width:64px; background:linear-gradient(90deg,transparent,var(--gold))}
    .ornament span:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
    .ornament i{color:var(--gold); font-style:normal; font-size:13px}
    .ded-moral{font-family:"Amiri", serif; font-size:19px; color:var(--ink); margin:2px 0 6px}
    .ded-cta{font-size:13px; color:var(--muted)}

    /* ===== Pied ===== */
    footer{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 16px; background:#0a1712; color:var(--muted); border-top:1px solid var(--ring); font-size:12px}
    footer::before{content:""; position:absolute; left:0; right:0; height:1px; margin-top:-11px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
    .kbd{font-family:ui-monospace, Menlo, Consolas, monospace; background:#0c1c16; border:1px solid var(--ring); color:var(--gold-2); padding:2px 6px; border-radius:6px}

    @media (max-width:720px){
      .brand-name{font-size:18px}
      .brand-sub{font-size:10px}
      .logo-mark{width:38px; height:38px}
      .big-controls .navBtn{width:52px; height:52px; font-size:22px}
      .viewer-container{height:calc(100vh - 250px)}
      .ded-name{font-size:25px}
    }
    @media (prefers-reduced-motion:reduce){
      *{animation:none !important; transition:none !important}
    }
  </style>
</head>
<body>
<div class="shell" id="app">
  <header>
    <div class="brand">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="lm-bg" cx="50%" cy="30%" r="80%">
              <stop offset="0%" stop-color="#173a2c"/><stop offset="60%" stop-color="#0f271e"/><stop offset="100%" stop-color="#081511"/>
            </radialGradient>
            <linearGradient id="lm-gold" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e6cd92"/><stop offset="55%" stop-color="#c9a25f"/><stop offset="100%" stop-color="#9c7c40"/>
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#lm-bg)" stroke="url(#lm-gold)" stroke-width="2.5"/>
          <rect x="13" y="13" width="94" height="94" rx="20" fill="none" stroke="#c9a25f" stroke-width="1" opacity="0.45"/>
          <path d="M40,86 L40,62 Q40,38 60,38 Q80,38 80,62 L80,86 Z" fill="#c9a25f" opacity="0.10"/>
          <path d="M40,86 L40,62 Q40,38 60,38 Q80,38 80,62 L80,86" fill="none" stroke="url(#lm-gold)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
          <path d="M53,86 L53,73 Q60,65 67,73 L67,86" fill="none" stroke="#c9a25f" stroke-width="2" stroke-linejoin="round"/>
          <line x1="60" y1="38" x2="60" y2="30" stroke="#c9a25f" stroke-width="1.8"/>
          <path d="M60,18 A8,8 0 1 0 60,34 A6,6 0 1 1 60,18 Z" fill="url(#lm-gold)"/>
          <circle cx="30" cy="46" r="1.7" fill="#e6cd92"/><circle cx="90" cy="46" r="1.7" fill="#e6cd92"/>
          <circle cx="34" cy="66" r="1.3" fill="#c9a25f"/><circle cx="86" cy="66" r="1.3" fill="#c9a25f"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1 class="brand-name">الزاوية المدنية الطاهرية</h1>
        <div class="brand-sub">القرآن الكريم والأوراد والأذكار</div>
      </div>
    </div>
    <div class="actions">
      <button id="openBtn" class="btn blue">اختر ملف PDF</button>
      <button id="fsBtn" class="btn">ملء الشاشة</button>
    </div>
    <input id="fileInput" type="file" accept="application/pdf" hidden />
  </header>

  <section class="controls">
    <div class="field">
      <label class="label">الصفحة الحالية / المجموع</label>
      <div style="display:flex; gap:8px">
        <input id="pageInput" class="input" type="number" min="1" value="1" style="max-width:120px" />
        <button id="goBtn" class="btn">اذهب</button>
      </div>
    </div>

    <div class="field">
      <label class="label">الفاصل الزمني للتقليب (ثوانٍ)</label>
      <div style="display:flex; gap:8px; align-items:center">
        <input id="intervalInput" class="input" type="number" min="10" step="5" value="60" style="max-width:140px" />
        <button id="applyInterval" class="btn">تطبيق</button>
      </div>
      <small class="label" id="nextFlip">التقليب كل 60 ثانية</small>
    </div>

    <div class="field">
      <label class="label">التحكم</label>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button id="playBtn" class="btn primary">تشغيل تلقائي</button>
        <button id="pauseBtn" class="btn warn" disabled>إيقاف مؤقت</button>
        <button id="prevBtn" class="btn">◀︎ السابقة</button>
        <button id="nextBtn" class="btn">التالي ▶︎</button>
        <label class="btn" style="display:flex; gap:8px; align-items:center">
          <input id="loopToggle" type="checkbox" checked /> تكرار عند آخر الصفحة
        </label>
      </div>
    </div>
  </section>

  <div class="viewer-container">
    <section class="viewer" id="viewer">
      <canvas id="pdfCanvas"></canvas>

      <!-- Dédicace affichée tant qu'aucun PDF n'est chargé -->
      <div id="welcome" class="welcome">
        <div class="welcome-inner">

    <div>اختصارات: <span class="kbd">Space</span> تشغيل/إيقاف — <span class="kbd">←/→</span> السابق/التالي — <span class="kbd">F</span> ملء الشاشة</div>
    <div id="saved">—</div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  const fileInput = document.getElementById('fileInput');
  const openBtn = document.getElementById('openBtn');
  const fsBtn = document.getElementById('fsBtn');
  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');
  const pageChip = document.getElementById('pageChip');
  const statusChip = document.getElementById('status');
  const viewer = document.getElementById('viewer');
  const viewerContainer = document.querySelector('.viewer-container');
  const welcome = document.getElementById('welcome');

  const pageInput = document.getElementById('pageInput');
  const goBtn = document.getElementById('goBtn');
  const intervalInput = document.getElementById('intervalInput');
  const applyInterval = document.getElementById('applyInterval');
  const nextFlip = document.getElementById('nextFlip');

  const playBtn = document.getElementById('playBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const bigPrev = document.getElementById('bigPrev');
  const bigNext = document.getElementById('bigNext');
  const loopToggle = document.getElementById('loopToggle');
  const saved = document.getElementById('saved');

  // ===== إعدادات pdf.js لدعم الخطوط العربية والـ CID fonts =====
  const PDFJS_VERSION = '3.11.174';
  const CDN_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/' + PDFJS_VERSION;

  let pdf = null;
  let pageNum = 1;
  let pageCount = 0;
  let timer = null;
  let intervalSec = 60;
  let fileName = null;

  if (window['pdfjsLib']) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = CDN_BASE + '/pdf.worker.min.js';
  }

  function setStatus(t){ statusChip.textContent = t; }
  function setPageChip(){ pageChip.textContent = `الصفحة ${pageNum} / ${pageCount||'—'}`; pageInput.value = pageNum; }
  function saveProgress(){ if(!fileName) return; try{ localStorage.setItem('quran:auto:pager:'+fileName, JSON.stringify({pageNum, intervalSec, loop: loopToggle.checked})); saved.textContent='تم الحفظ'; setTimeout(()=>saved.textContent='—',800);}catch(e){} }
  function loadProgress(){ if(!fileName) return; try{ const raw = localStorage.getItem('quran:auto:pager:'+fileName); if(!raw) return; const d = JSON.parse(raw); if(d.pageNum) pageNum = d.pageNum; if(d.intervalSec) { intervalSec = d.intervalSec; intervalInput.value = intervalSec; nextFlip.textContent = `التقليب كل ${intervalSec} ثانية`; } if(typeof d.loop==='boolean') loopToggle.checked = d.loop; }catch(e){} }

  function calculateScale(viewport) {
    const containerWidth = viewerContainer.clientWidth;
    const containerHeight = viewerContainer.clientHeight;
    const scaleX = containerWidth / viewport.width;
    const scaleY = containerHeight / viewport.height;
    return Math.min(scaleX, scaleY) * 0.95;
  }

  async function render(){
    if(!pdf) return;
    setStatus('جارٍ العرض…');
    try {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({scale: 1});
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const scale = calculateScale(viewport);
      const renderScale = scale * dpr;
      const scaledViewport = page.getViewport({scale: renderScale});

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      canvas.style.width = (viewport.width * scale) + 'px';
      canvas.style.height = (viewport.height * scale) + 'px';

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;

      setPageChip();
      setStatus('جاهز');
      saveProgress();
    } catch (error) {
      console.error('Error rendering page:', error);
      setStatus('خطأ في العرض');
    }
  }

  function play(){
    if(timer) return;
    playBtn.textContent='قيد التشغيل';
    playBtn.disabled=true;
    pauseBtn.disabled=false;
    setStatus('تقليب تلقائي…');
    timer = setInterval(()=>{
      if(pageNum < pageCount){ pageNum++; render(); }
      else if(loopToggle.checked){ pageNum = 1; render(); }
      else { pause(); }
    }, intervalSec*1000);
  }

  function pause(){
    if(!timer) return;
    clearInterval(timer); timer=null;
    playBtn.textContent='تشغيل تلقائي';
    playBtn.disabled=false; pauseBtn.disabled=true;
    setStatus('متوقف مؤقتًا');
  }

  function next(){ if(!pdf) return; if(pageNum < pageCount){ pageNum++; render(); } }
  function prev(){ if(!pdf) return; if(pageNum > 1){ pageNum--; render(); } }
  function goTo(p){ if(!pdf) return; const n = Math.min(pageCount, Math.max(1, Math.floor(p||1))); pageNum = n; render(); }

  openBtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    fileName = file.name;
    setStatus('تحميل الملف…');
    const fr = new FileReader();
    fr.onload = async ()=>{
      try {
        const typedarray = new Uint8Array(fr.result);
        // ===== الإصلاح: خيارات تصحيح عرض الخطوط العربية =====
        pdf = await pdfjsLib.getDocument({
          data: typedarray,
          cMapUrl: CDN_BASE + '/cmaps/',
          cMapPacked: true,
          disableFontFace: true,
          useSystemFonts: true,
          standardFontDataUrl: CDN_BASE + '/standard_fonts/'
        }).promise;
        pageCount = pdf.numPages;
        pageNum = 1;
        setPageChip();
        loadProgress();
        await render();
        // masquer la dédicace et activer l'UI de lecture
        viewerContainer.classList.add('ready');
        if(welcome) welcome.classList.add('hidden');
      } catch (error) {
        console.error('Error loading PDF:', error);
        setStatus('خطأ في تحميل الملف');
      }
    };
    fr.onerror = () => setStatus('خطأ في قراءة الملف');
    fr.readAsArrayBuffer(file);
  });

  fsBtn.addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      viewerContainer.requestFullscreen?.().catch(err => console.error('Error attempting to enable fullscreen:', err));
    } else {
      document.exitFullscreen?.();
    }
  });

  applyInterval.addEventListener('click', ()=>{
    const v = Math.max(5, Math.floor(+intervalInput.value||60));
    intervalSec = v;
    nextFlip.textContent = `التقليب كل ${v} ثانية`;
    saveProgress();
    if(timer){ pause(); play(); }
  });

  playBtn.addEventListener('click', play);
  pauseBtn.addEventListener('click', pause);
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  bigNext.addEventListener('click', next);
  bigPrev.addEventListener('click', prev);
  goBtn.addEventListener('click', ()=> goTo(+pageInput.value));

  window.addEventListener('keydown', (e)=>{
    if(e.key === ' ') { e.preventDefault(); timer ? pause() : play(); }
    if(e.key === 'ArrowRight') next();
    if(e.key === 'ArrowLeft') prev();
    if(e.key.toLowerCase() === 'f') fsBtn.click();
  });

  let resizeTimeout = null;
  window.addEventListener('resize', ()=>{
    if(!pdf) return;
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => render(), 150);
  });

  window.addEventListener('load', () => {
    const savedFile = localStorage.getItem('quran:auto:pager:lastFile');
    if(savedFile) { /* réservé */ }
  });
})();
</script>
</body>
</html>
